name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::952669596230:role/x0lie-analytics-github-actions
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          docker build -t 952669596230.dkr.ecr.us-east-1.amazonaws.com/x0lie-analytics:${{ github.sha }} .
          docker push 952669596230.dkr.ecr.us-east-1.amazonaws.com/x0lie-analytics:${{ github.sha }}

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init
        working-directory: terraform/infra

      - run: terraform apply -auto-approve -var="image_tag=${{ github.sha }}"
        working-directory: terraform/infra
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
